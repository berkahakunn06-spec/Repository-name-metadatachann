<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MetadataChann</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <div class="sidebar">

    <h1>✨ MetadataChann</h1>
    <p>AI Metadata Generator for Adobe Stock</p>

    <div class="box">
      <label>🧠 AI Provider</label>

      <select>
        <option>Grok</option>
        <option>Gemini</option>
        <option>OpenAI</option>
      </select>
    </div>

    <div class="box">
      <label>🔑 API Key</label>

      <input type="text" placeholder="Masukkan API Key">
    </div>

    <div class="box">
      <label>📂 Choose Files</label>

      <input type="file" multiple>
    </div>

    <div class="box">
      <button>⚡ Generate Metadata</button>
    </div>

  </div>

  <div class="content">

    <div class="result-box">

      <h2>✨ MetadataChann Result</h2>

      <div class="result">

        <p>✅ METADATA SUCCESS</p>

        <br>

        <p>📄 FILE:</p>
        <p>example.png</p>

        <br>

        <p>📝 TITLE:</p>
        <p>Futuristic Technology Interface Background</p>

        <br>

        <p>🔑 KEYWORDS:</p>
        <p>adobe, stock, ai, metadata, futuristic, neon</p>

        <br>

        <p>📄 DESCRIPTION:</p>
        <p>Generated by MetadataChann AI</p>

      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
